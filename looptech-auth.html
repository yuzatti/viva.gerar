<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>looptech_ — Autenticacao</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#080b10;--dark:#0d1117;--card:#ffffff;--border:#e4e7ec;--muted:#667085;--text:#101828;--accent:#00e5ff;--accent2:#0066ff;--danger:#f04438;--input-bg:#f9fafb}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--black);min-height:100vh;display:flex;overflow:hidden}
.left{width:48%;min-height:100vh;background:var(--dark);display:flex;flex-direction:column;justify-content:space-between;padding:48px 52px;position:relative;overflow:hidden;flex-shrink:0}
.left::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.left::after{content:'';position:absolute;top:-120px;left:-80px;width:420px;height:420px;background:radial-gradient(circle,rgba(0,102,255,0.18) 0%,transparent 70%);pointer-events:none}
.left-line{position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(0,229,255,0.3) 40%,rgba(0,229,255,0.3) 60%,transparent)}
.left-top,.left-bottom,.left-copy{position:relative;z-index:2}
.logo{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:#fff;letter-spacing:-.02em;display:flex;align-items:center;gap:0}
.logo-bracket{color:var(--accent);font-size:28px}.logo-underscore{color:var(--accent);animation:blink 1.2s step-end infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.left-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(0,229,255,.25);padding:4px 10px;border-radius:3px;margin-bottom:20px}
.left-headline{font-size:36px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.03em;max-width:340px}.left-headline span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.left-desc{margin-top:16px;font-size:14px;color:#4a5568;line-height:1.65;max-width:320px}.left-footer{font-size:11px;color:#2d3748;font-family:'DM Mono',monospace}
.circuit{position:absolute;bottom:80px;right:40px;opacity:.06;pointer-events:none}
.right{flex:1;display:flex;align-items:center;justify-content:center;background:#f7f8fa;padding:40px 32px;min-height:100vh}
.form-box{width:100%;max-width:400px}.form-header{margin-bottom:32px}.form-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.02em}.form-subtitle{font-size:13.5px;color:var(--muted);margin-top:5px}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}.divider-line{flex:1;height:1px;background:var(--border)}.divider-text{font-size:11.5px;color:#b0bec5;font-family:'DM Mono',monospace;letter-spacing:.06em;white-space:nowrap}
.field{margin-bottom:16px}label{display:block;font-size:12.5px;font-weight:600;color:#344054;margin-bottom:6px}input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;background:var(--input-bg);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(0,102,255,.1);background:#fff}
.error-msg{display:none;background:#fef3f2;border:1px solid #fecdc9;border-radius:7px;padding:10px 13px;font-size:12.5px;color:var(--danger);margin-bottom:14px}.error-msg.visible{display:block}
.btn-submit{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;margin-top:4px}.btn-submit:hover{background:#1a2535}.form-bottom{margin-top:24px;text-align:center;font-size:12px;color:var(--muted)}
@media(max-width:768px){body{flex-direction:column;overflow:auto}.left{width:100%;min-height:auto;padding:36px 28px}.left-headline{font-size:26px}.circuit{display:none}.right{padding:36px 24px;min-height:auto}}
</style>
</head>
<body>
<div class="left"><div class="left-line"></div><div class="left-top"><div class="logo"><span class="logo-bracket">[</span>looptech<span class="logo-bracket">]</span><span class="logo-underscore">_</span></div></div><div class="left-copy"><div class="left-tag">Plataforma corporativa</div><div class="left-headline">Acesso seguro<br>a todos os seus<br><span>sistemas.</span></div><div class="left-desc">Autenticacao centralizada, segura e auditavel para toda a plataforma looptech_.</div></div><div class="left-bottom"><div class="left-footer">© 2026 looptech_ · Todos os direitos reservados</div></div><svg class="circuit" width="200" height="200" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="80" stroke="#00e5ff"/><circle cx="100" cy="100" r="50" stroke="#00e5ff"/><circle cx="100" cy="100" r="20" stroke="#00e5ff"/><line x1="100" y1="20" x2="100" y2="80" stroke="#00e5ff"/><line x1="100" y1="120" x2="100" y2="180" stroke="#00e5ff"/><line x1="20" y1="100" x2="80" y2="100" stroke="#00e5ff"/><line x1="120" y1="100" x2="180" y2="100" stroke="#00e5ff"/></svg></div>
<div class="right"><div class="form-box"><div class="form-header"><div class="form-title">Faca login</div><div class="form-subtitle">Insira suas credenciais para continuar</div></div><div class="divider"><div class="divider-line"></div><span class="divider-text">acesse com usuario</span><div class="divider-line"></div></div><div id="error-box" class="error-msg"></div><div class="field"><label for="email">Email corporativo</label><input type="text" id="email" placeholder="carlos.gouveia@looptech.com.br"></div><div class="field"><label for="senha">Senha</label><input type="password" id="senha" placeholder="••••••••"></div><button class="btn-submit" onclick="fazerLogin()">Acessar</button><div class="form-bottom">Acesso restrito ao RH GERAR</div></div></div>
<script>
const USUARIOS_AUTORIZADOS={"gabriela.costa":{nome:"Gabriela Costa",senha:"GERAR26!",cargo:"Recrutadora • Analista de Pessoas"},"yasmin.maciel":{nome:"Yasmin Maciel",senha:"GERAR26!",cargo:"Jovem Aprendiz • Recrutamento e Seleção"},"mateus":{nome:"Mateus",senha:"GERAR26!",cargo:"Jovem Aprendiz • Recrutamento e Seleção"},"carlos.gouveia":{nome:"Carlos Gouveia",senha:"GERAR26!",cargo:"Recrutador • Motor de Mídias e Inovações"}};
function normalizarUsuario(v){return v.trim().toLowerCase().replace(/\s+/g,"").replace(/@.*$/,"")}
function erro(m){const e=document.getElementById("error-box");e.textContent=m;e.classList.add("visible")}
function fazerLogin(){const u=normalizarUsuario(document.getElementById("email").value);const s=document.getElementById("senha").value;document.getElementById("error-box").classList.remove("visible");if(!u||!s){erro("Informe usuario e senha.");return}const d=USUARIOS_AUTORIZADOS[u];if(d&&d.senha===s){localStorage.setItem("usuarioLogado",JSON.stringify({usuario:u,nome:d.nome,cargo:d.cargo||"Equipe GERAR",loginEm:new Date().toISOString()}));location.href="painel-rh.html"}else erro("Credenciais invalidas. Verifique email e senha.")}
document.addEventListener("keydown",e=>{if(e.key==="Enter")fazerLogin()});
</script>
</body>
</html>
